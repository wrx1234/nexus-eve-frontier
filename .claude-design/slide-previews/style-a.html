<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS - Style A: Dark Botanical</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(ellipse at 30% 50%, #1a0a3e 0%, #0d0221 40%, #030014 100%);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }

  canvas#stars { position: fixed; inset: 0; z-index: 0; }

  .nebula {
    position: fixed; border-radius: 50%; filter: blur(120px); opacity: .35;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .nebula-1 { width: 600px; height: 600px; top: -10%; left: -5%; background: #3b1f8e; }
  .nebula-2 { width: 500px; height: 500px; bottom: -15%; right: -10%; background: #0e4d92; animation-delay: -6s; }
  .nebula-3 { width: 300px; height: 300px; top: 40%; left: 55%; background: #00d4ff22; animation-delay: -3s; }

  @keyframes drift {
    to { transform: translate(40px, -30px) scale(1.08); }
  }

  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 72px 80px;
    max-width: 820px; width: 90%;
    text-align: center;
    box-shadow: 0 0 80px rgba(0,212,255,0.06), inset 0 0 80px rgba(255,255,255,0.02);
    animation: cardIn 1.2s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(.96); }
  }

  .tag {
    display: inline-block;
    font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
    color: #00d4ff;
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 100px;
    padding: 6px 20px;
    margin-bottom: 36px;
    animation: glow 3s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 8px rgba(0,212,255,0.2); }
    to   { box-shadow: 0 0 20px rgba(0,212,255,0.45); }
  }

  h1 {
    font-size: 96px; font-weight: 900; letter-spacing: -2px; line-height: 1;
    background: linear-gradient(135deg, #fff 30%, #00d4ff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 18px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 32px;
  }

  .desc {
    font-size: 20px; font-weight: 400; color: rgba(255,255,255,0.7);
    margin-bottom: 48px; line-height: 1.5;
  }

  .footer {
    display: flex; justify-content: center; gap: 32px; flex-wrap: wrap;
    font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 400;
  }
  .footer span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: #00d4ff; display: inline-block;
    animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .3; } }
</style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <div class="card">
    <div class="tag">EVE Frontier × Sui Hackathon 2026</div>
    <h1>NEXUS</h1>
    <p class="subtitle">Neural EXecutive for Unified Stations</p>
    <p class="desc">Your 24/7 AI Assembly Manager for EVE Frontier</p>
    <div class="footer">
      <span><span class="dot"></span> Built by Xuan</span>
      <span><span class="dot"></span> Powered by AI</span>
    </div>
  </div>

  <script>
    const c = document.getElementById('stars'), ctx = c.getContext('2d');
    let w, h, stars = [];
    function resize() { w = c.width = innerWidth; h = c.height = innerHeight; }
    function init() {
      resize(); stars = [];
      for (let i = 0; i < 200; i++)
        stars.push({ x: Math.random()*w, y: Math.random()*h,
          r: Math.random()*1.5+.3, a: Math.random(), s: Math.random()*.005+.002 });
    }
    function draw() {
      ctx.clearRect(0,0,w,h);
      for (const s of stars) {
        s.a += s.s; if (s.a > 1) s.s = -Math.abs(s.s); if (s.a < .1) s.s = Math.abs(s.s);
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(180,210,255,${s.a})`; ctx.fill();
      }
      requestAnimationFrame(draw);
    }
    init(); draw(); addEventListener('resize', init);
  </script>
</body>
</html>
